<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>自由沙盒 · Blender 材質節點學習網站</title>
<meta name="description" content="Blender 材質節點自由沙盒：拖拉節點、自己接線，右側 3D 預覽即時反應每一次修改。內建大量預設材質可直接載入修改，支援匯出/匯入節點圖。" />
<meta name="theme-color" content="#1b1b1e" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b1b1e'/%3E%3Ccircle cx='16' cy='48' r='7' fill='%23ff8a2b'/%3E%3Ccircle cx='48' cy='16' r='7' fill='%2363c763'/%3E%3Ccircle cx='48' cy='48' r='7' fill='%236d6dd6'/%3E%3Cpath d='M16 48L48 16M16 48L48 48' stroke='%23c7c7cf' stroke-width='3' fill='none'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/globalSearch.css" />
<link rel="stylesheet" href="css/sandbox.css" />
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.min.js",
    "three/addons/": "./vendor/three/addons/"
  }
}
</script>
</head>
<body>
<div class="app-shell">
  <header class="site-nav">
    <div class="brand">Blender 材質<span>節點學堂</span></div>
    <nav>
      <a href="index.html" data-i18n="nav.home">首頁</a>
      <a href="encyclopedia.html" data-i18n="nav.encyclopedia">節點百科</a>
      <a href="sandbox.html" class="active" data-i18n="nav.sandbox">自由沙盒</a>
      <a href="tutorials.html" data-i18n="nav.tutorials">引導教學</a>
      <a href="reference.html" data-i18n="nav.reference">參考表</a>
      <a href="troubleshoot.html" data-i18n="nav.troubleshoot">疑難排解</a>
    </nav>
    <button id="global-search-btn" type="button"><span data-i18n="search.button">搜尋</span><span class="gs-kbd">Ctrl K</span></button>
    <button id="lang-toggle" type="button">中 / EN</button>
  </header>

  <div class="app-body sandbox-body">
    <div class="mobile-panel-tabs">
      <button type="button" class="mobile-panel-tab" data-panel="nodes" data-i18n="sandbox.tabNodes">節點</button>
      <button type="button" class="mobile-panel-tab" data-panel="canvas" data-i18n="sandbox.tabCanvas">畫布</button>
      <button type="button" class="mobile-panel-tab" data-panel="props" data-i18n="sandbox.tabProps">預覽/屬性</button>
    </div>
    <aside class="panel palette-panel">
      <div class="panel-title" data-i18n="sandbox.palette">節點面板</div>
      <input type="text" id="palette-search" placeholder="搜尋節點…" data-i18n-placeholder="sandbox.searchPlaceholder" />
      <div id="palette-list" class="palette-list">
        <div class="empty-hint">節點清單載入中…</div>
      </div>
    </aside>

    <main class="editor-panel">
      <div class="editor-toolbar">
        <button id="btn-undo" type="button" title="Ctrl+Z" data-i18n="sandbox.undo">↶ 復原</button>
        <button id="btn-redo" type="button" title="Ctrl+Y" data-i18n="sandbox.redo">↷ 重做</button>
        <select id="preset-select">
          <option value="" data-i18n="sandbox.loadPreset">載入預設材質…</option>
        </select>
        <button id="btn-duplicate" type="button" title="Shift+D" data-i18n="sandbox.duplicate">⧉ 複製</button>
        <button id="btn-delete" type="button" title="Delete" data-i18n="sandbox.delete">🗑 刪除</button>
        <button id="btn-frame-all" type="button" title="Home" data-i18n="sandbox.frameAll">⤢ 縮放至全部</button>
        <div class="toolbar-spacer"></div>
        <button id="btn-export" type="button" data-i18n="sandbox.export">匯出 JSON</button>
        <button id="btn-import" type="button" data-i18n="sandbox.import">匯入 JSON</button>
        <input type="file" id="file-import" accept="application/json" hidden />
        <button id="btn-clear" type="button" data-i18n="sandbox.clear">清空</button>
      </div>
      <div id="preset-description" class="preset-description" hidden></div>
      <div id="graph-canvas" class="graph-canvas"></div>
      <div id="mini-preview-slot" class="mini-preview-slot"></div>
    </main>

    <aside class="panel side-panel">
      <div class="preview-block">
        <div class="panel-title-row">
          <span class="panel-title" data-i18n="sandbox.preview">即時預覽</span>
          <select id="mesh-select">
            <option value="sphere">Sphere 球體</option>
            <option value="cube">Cube 方塊</option>
            <option value="plane">Plane 平面</option>
            <option value="torus">Torus 環結</option>
          </select>
        </div>
        <div id="preview-container" class="preview-container"></div>
        <div id="shader-error" class="shader-error" hidden></div>
      </div>
      <div class="inspector-block">
        <div class="panel-title" data-i18n="sandbox.inspector">節點屬性</div>
        <div id="inspector-body" class="inspector-body">
          <div class="empty-hint" data-i18n="sandbox.selectHint">選取一個節點以編輯參數</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script src="js/bootGuard.js"></script>
<script type="module" src="js/app-sandbox.js"></script>
</body>
</html>
